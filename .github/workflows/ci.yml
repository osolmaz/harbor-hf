name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --all-groups --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest --cov=src/harbor_hf --cov-fail-under=85
      - run: uv run pytest tests/test_presentation.py --cov=space --cov-fail-under=85
      - run: uv run slophammer-py dry .
      - run: uv run python scripts/check_mutation.py --min-kill-rate 90
      - run: uv run pip-audit
      - run: uv run slophammer-py check .
