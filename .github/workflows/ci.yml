name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --all-groups --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest --cov=src/harbor_hf --cov-fail-under=85
      - run: npm ci && npm run build
        working-directory: apps/results-web
      - run: docker build -f deploy/space/Dockerfile .
      - run: uv run slophammer-py dry .
      - run: uv run pip-audit
      - run: uv run slophammer-py check . --baseline
